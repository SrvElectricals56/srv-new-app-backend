name: srv-production

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - ${BACKEND_ENV_FILE:-/opt/srv/secrets/backend.env}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      SWAGGER_ENABLED: 'false'
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - ${UPLOADS_PATH:-/opt/srv/shared/uploads}:/app/uploads
      - ${DB_CA_FILE:-/opt/srv/secrets/managed-postgres-ca.crt}:/run/secrets/managed-postgres-ca.crt:ro
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin:
    build:
      context: ../srv-new-adminpanel
      dockerfile: ../srv-new-app-backend/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
        SERVER_API_URL: http://backend:3001/api/v1
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      SERVER_API_URL: http://backend:3001/api/v1
    ports:
      - '127.0.0.1:3000:3000'
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=256m,uid=1000,gid=1000,mode=1770
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    stop_grace_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  default:
    name: srv-production-network
