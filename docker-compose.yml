version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: srv_admin_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4268
      POSTGRES_DB: srv_admin
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: srv_admin_app
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - postgres
volumes:
  postgres_data:
