services:
  postgres:
    image: postgres:15-alpine
    container_name: srv_admin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4268
      POSTGRES_DB: srv_admin
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/upadted.sql:/docker-entrypoint-initdb.d/01-upadted.sql:ro
      - ./docker/postgres/02-drop-prisma-metadata.sql:/docker-entrypoint-initdb.d/02-drop-prisma-metadata.sql:ro
      - ./docker/postgres/03-create-current-tables.sql:/docker-entrypoint-initdb.d/03-create-current-tables.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d srv_admin']
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: srv_admin_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

  backend:
    build: .
    container_name: srv_admin_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      RUNNING_IN_DOCKER: 'true'
      HOST: 0.0.0.0
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 4268
      DB_DATABASE: srv_admin
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      JWT_SECRET: srv-admin-secret-key-2024
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: srv-admin-refresh-secret-2024
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8081,http://127.0.0.1:8081
      CORS_CREDENTIALS: 'true'
      API_PREFIX: api/v1
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 20

  admin-frontend:
    build:
      context: ../ADMIN-FRONTEND
      dockerfile: ../ADMIN-BACKEND/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001/api/v1}
        SERVER_API_URL: ${SERVER_API_URL:-http://backend:3001/api/v1}
    container_name: srv_admin_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001/api/v1}
      SERVER_API_URL: ${SERVER_API_URL:-http://backend:3001/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '3000:3000'

  mobile-app:
    build:
      context: ../NEW APP
      dockerfile: ../ADMIN-BACKEND/docker/expo-app.Dockerfile
    container_name: srv_mobile_app
    restart: unless-stopped
    environment:
      CI: 1
      EXPO_NO_TELEMETRY: 1
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: localhost
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://127.0.0.1:3001/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8081:8081'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:8081').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  pgadmin_data:
